<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/sections/header.css">
    <link rel="stylesheet" href="../css/sections/footer.css">
    <link rel="stylesheet" href="../css/sections/products.css">
    <link rel="icon" type="image/png" href="../assets/Icon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

</head>

<body>
    
<!--Navbar starts-->
      <div id="navbar"></div> 
        <script>
            fetch('../html/navbar.html') // Path to navbar.html
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load navbar.');
                    return response.text();
                })
                .then(html => {
                    document.getElementById('navbar').innerHTML = html;
                    import('/js/script.js');
                })
                .catch(error => console.error(error));
        </script>
<!-- Navbar ends -->

<!-- Main content starts here -->
        <div class="wrapper">
            <h1 class="page-heading">PRODUCTS</h1>
        </div>

<div class="products-container">
    <div class="product-card">
        <img src="../assets/products/Collet-Chucks.jpg" alt="Product 1">
        <h2>Collet Chuck</h2>
        <button onclick="window.location.href='Products/colletchuck.html'">Checkout</button>
    </div>
    <div class="product-card">
        <img src="../assets/products/Power-Chuck.jpg" alt="Product 2">
        <h2>Power Chuck</h2>
        <button>Checkout</button>
    </div>
    <div class="product-card">
        <img src="../assets/products/Rotary-Cylinders.jpg" alt="Product 3">
        <h2>Rotary Cylinder</h2>
        <button>Checkout</button>
    </div>
    <div class="product-card">
        <img src="../assets/products/Collet-Chucks.jpg" alt="Product 4">
        <h2>Stationary Chuck</h2>
        <button>Checkout</button>
    </div>
    <div class="product-card">
        <img src="../assets/products/Collet-Chucks.jpg" alt="Product 4">
        <h2>Long stroke chuck</h2>
        <button>Checkout</button>
    </div>
    <div class="product-card">
        <img src="../assets/products/Collet-Chucks.jpg" alt="Product 4">
        <h2>Through hole chuck</h2>
        <button>Checkout</button>
    </div>
</div>

<!-- Main content ends here -->

<!--Footer starts-->
<footer class="footer" id="footer">
      <div id="footer"></div> 
        <script>
            fetch('../html/footer.html') // Path to navbar.html
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load footer.');
                    return response.text();
                })
                .then(html => {
                    document.getElementById('footer').innerHTML = html;
                })
                .catch(error => console.error(error));
        </script>
</footer>
<!-- Footer ends -->

</body>
</html>
