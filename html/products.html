      <div id="navbar"></div> 
        <script>
            fetch('../html/navbar.html') // Path to navbar.html

                    return response.text();
                })
                .then(html => {
                    document.getElementById('navbar').innerHTML = html;

                })
                .catch(error => console.error(error));
        </script>
