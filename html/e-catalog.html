<script src="../js/jquery.js"></script>
<script src="../js/turn.js"></script>
<script>
  $(function () {
    const flipWidth = 800;
    const flipHeight = 566.5;

    // Initialize flipbook
    $('.flipbook').turn({
      width: flipWidth,
      height: flipHeight,
    //   autoCenter: true,
      display: 'double',   // double-page layout
      acceleration: true,
      gradients: true,
      duration: 1000,      // flip speed
      elevation: 50,       // shadow effect
    });

    const totalPages = $('.flipbook div').length;

    // Handle cover/front/back page z-index
    $('.flipbook').bind('turning', function(event, page, view) {
      // Front cover
      if(page === 1){
        $('.flipbook div:first-child').css('z-index', 10);
      } else {
        $('.flipbook div:first-child').css('z-index', '');
      }

    //   // Back cover
    //   if(page === totalPages){
    //     $('.flipbook div:last-child').css('z-index', 10);
    //   } else {
    //     $('.flipbook div:last-child').css('z-index', '');
    //   }
    });
  });
</script>
